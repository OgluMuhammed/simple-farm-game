<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Farm Tycoon</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e0f0d0; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Auth Screen Styling */
        #authScreen { max-width: 300px; margin: 80px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        #authScreen input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        #authScreen button { width: 95%; padding: 10px; margin: 5px 0; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #2e8b57; color: white; }
        .btn-register { background: #cd853f; color: white; }
        #errorMessage { color: red; font-weight: bold; margin-bottom: 10px; }

        /* Game Screen Styling */
        .stats { font-size: 24px; font-weight: bold; color: #b8860b; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 15px; justify-content: center; }
        .tile { width: 110px; height: 110px; background: #8b5a2b; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; transition: background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tile.growing { background: #cd853f; color: #fff8dc; }
        .tile.ready { background: #2e8b57; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="authScreen">
        <h2>🧑‍🌾 Join the Farm</h2>
        <div id="errorMessage"></div>
        <input type="text" id="usernameInput" placeholder="Username" maxlength="15">
        <input type="password" id="passwordInput" placeholder="Password">
        <button class="btn-login" id="loginBtn">Log In</button>
        <button class="btn-register" id="registerBtn">Sign Up</button>
    </div>

    <div id="gameScreen" class="hidden">
        <h1>Multiplayer Farm Tycoon</h1>
        <p>Welcome back, <span id="farmerName" style="color:#2e8b57;">Player</span>!</p>
        <div class="stats">💰 Coins: <span id="coinCount">0</span></div>
        <div class="grid" id="farmGrid"></div>
    </div>

    <script>
        const socket = io();
        
        // Dom References
        const authScreen = document.getElementById('authScreen');
        const gameScreen = document.getElementById('gameScreen');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');
        const coinCountElement = document.getElementById('coinCount');
        const farmerName = document.getElementById('farmerName');
        const gridElement = document.getElementById('farmGrid');

        // Action triggers
        document.getElementById('loginBtn').addEventListener('click', () => {
            socket.emit('login', { username: usernameInput.value, password: passwordInput.value });
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            socket.emit('register', { username: usernameInput.value, password: passwordInput.value });
        });

        // Setup the physical canvas tiles
        for (let i = 0; i < 9; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.id = `tile-${i}`;
            tile.innerText = "Dirt";
            tile.addEventListener('click', () => socket.emit('tileClick', { tileId: i }));
            gridElement.appendChild(tile);
        }

        // Server Response Actions
        socket.on('authSuccess', (userData) => {
            authScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            farmerName.innerText = userData.username;
            coinCountElement.innerText = userData.coins;
        });

        socket.on('authError', (message) => {
            errorMessage.innerText = message;
        });

        socket.on('updateGrid', (serverGrid) => {
            serverGrid.forEach((tileState, index) => {
                const tile = document.getElementById(`tile-${index}`);
                tile.className = 'tile';
                if (tileState.status === 'empty') tile.innerText = "🤎 Dirt";
                else if (tileState.status === 'growing') { tile.classList.add('growing'); tile.innerText = "🌱 Growing..."; }
                else if (tileState.status === 'ready') { tile.classList.add('ready'); tile.innerText = "🌾 Harvest!"; }
            });
        });

        socket.on('updateBalance', (balance) => {
            coinCountElement.innerText = balance;
        });
    </script>
</body>
</html>
